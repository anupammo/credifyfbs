<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credify · Form Builder</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #eaf0ec;            /* Credify surface-2, frames the 90% card */
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  /* The app fills 90% of the browser window's width and height. */
  #frame-wrap {
    width: 90vw;
    height: 90vh;
    border-radius: 14px;
    overflow: hidden;
    background: #f4f7f5;
    box-shadow: 0 16px 48px rgba(13, 31, 24, .16);
  }
  #app-frame {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
  }
  /* On small windows, go full-bleed so nothing is cramped. */
  @media (max-width: 768px) {
    #frame-wrap { width: 100vw; height: 100vh; border-radius: 0; box-shadow: none; }
  }
</style>
</head>
<body>
  <div id="frame-wrap"></div>
  <!-- Inline scripts are blocked on MV3 extension pages, so the host logic lives here. -->
  <script src="newtab.js"></script>
</body>
</html>
