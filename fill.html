<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Credify Form</title>
<link rel="icon" href="/favicon.ico" sizes="32x32">
<link rel="icon" type="image/png" href="/icon.png" sizes="192x192">
<link rel="apple-touch-icon" href="/apple-icon.png" sizes="180x180">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--green-deep:#0a3d2b;--green-primary:#1a8a66;--mint-pale-2:#d4f4e8;--text-main:#0d1f18;--text-muted:#527060;--text-muted-2:#8aaa9a;--border:#e2efe9}
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{font-family:'Sora',system-ui,-apple-system,sans-serif;color:var(--text-main);background:linear-gradient(180deg,#f6faf8 0%,#eaf1ed 100%)}
  #frame{position:fixed;inset:0;width:100%;height:100%;border:0;background:transparent;display:none}
  .center{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:24px}
  .spinner{width:26px;height:26px;border-radius:50%;border:3px solid var(--mint-pale-2);border-top-color:var(--green-primary);animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .msg{display:flex;flex-direction:column;align-items:center;gap:12px;color:var(--text-muted);font-size:14px;font-weight:500}
  .card{width:100%;max-width:480px;background:#fff;border:1px solid var(--border);border-radius:18px;padding:36px 30px;text-align:center;box-shadow:0 18px 50px -22px rgba(10,61,43,.35)}
  .brand{display:inline-flex;align-items:center;gap:9px;margin-bottom:16px}
  .brand-mark{width:30px;height:30px;border-radius:7px;background:linear-gradient(135deg,var(--green-deep),var(--green-primary));display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Instrument Serif',Georgia,serif;font-size:18px;line-height:1}
  .brand-name{font-family:'Instrument Serif',Georgia,serif;font-size:20px;line-height:1}
  .card h1{font-family:'Instrument Serif',Georgia,serif;font-weight:400;font-size:24px;margin:6px 0 8px}
  .card p{font-size:14px;color:var(--text-muted);margin:0;line-height:1.55}
  .foot{margin-top:18px;font-size:12px;color:var(--text-muted-2)}
</style>
</head>
<body>
  <iframe id="frame" title="Credify form"></iframe>
  <div class="center" id="status">
    <div class="msg"><div class="spinner"></div><div>Loading your form&hellip;</div></div>
  </div>
<script>
(function(){
  var API='https://chrome.credifyfast.com';
  // Token is the last path segment of /f/<token> (tolerate a trailing slash).
  var parts=location.pathname.replace(/\/+$/,'').split('/');
  var token=decodeURIComponent(parts[parts.length-1]||'');
  var statusEl=document.getElementById('status');

  function card(title,msg){
    statusEl.innerHTML='<div class="card"><div class="brand"><div class="brand-mark">C</div>'
      +'<div class="brand-name">Credify</div></div><h1>'+title+'</h1><p>'+msg+'</p>'
      +'<div class="foot">Credify &middot; Push It, Inc.</div></div>';
  }

  if(!token || token==='f'){
    card('Form not found','This form link looks incomplete. Please check the link you were given.');
    return;
  }

  fetch(API+'/api/links/'+encodeURIComponent(token),{headers:{'Accept':'application/json'}})
    .then(function(r){ return r.json().then(function(j){ return {ok:r.ok,j:j}; }); })
    .then(function(res){
      if(!res.ok){
        card('Form unavailable',(res.j&&res.j.error)||'This form link is not available.');
        return;
      }
      var html=(res.j.form&&res.j.form.html)||'';
      if(!html){ card('Form unavailable','This form has no content to display.'); return; }
      // Point the exported form's built-in submit at THIS link's submit endpoint,
      // injected before its scripts run (it reads window.CREDIFY_SUBMIT_URL).
      var inject='<scr'+'ipt>window.CREDIFY_SUBMIT_URL='+JSON.stringify(API+'/api/links/'+token+'/submit')+';</scr'+'ipt>';
      html=html.indexOf('</head>')>=0 ? html.replace('</head>', inject+'</head>') : inject+html;
      var frame=document.getElementById('frame');
      frame.onload=function(){ statusEl.style.display='none'; frame.style.display='block'; };
      frame.srcdoc=html;
    })
    .catch(function(){
      card('Connection problem','We couldn&rsquo;t load this form. Please check your connection and try again.');
    });
})();
</script>
</body>
</html>
