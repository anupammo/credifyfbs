version: '3.9'

# Production-parity smoke-test compose.
# Requires .env file or env vars set in the shell.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: credify
      POSTGRES_USER: credify
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      # host:container — Postgres listens on 5432 inside the container.
      - '5434:5432'
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U credify']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-30d}
      AES_MASTER_KEY: ${AES_MASTER_KEY}
      HMAC_SECRET: ${HMAC_SECRET}
      NODE_ENV: production
    ports:
      # Kept exposed so the legacy http://35.255.131.130:3000 endpoint still
      # works during the domain cutover. Remove once everything uses the domain.
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy

  # TLS reverse proxy — terminates HTTPS with the wildcard cert and forwards
  # to the backend over the internal network.
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - '443:443'
    volumes:
      - ./nginx/chrome.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend

volumes:
  pgdata_prod:
