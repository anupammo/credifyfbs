version: '3.9'

# Production-parity smoke-test compose.
# Requires .env file or env vars set in the shell.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: credify
      POSTGRES_USER: credify
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      # host:container — Postgres listens on 5432 inside the container.
      - '5434:5432'
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U credify']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-30d}
      AES_MASTER_KEY: ${AES_MASTER_KEY}
      HMAC_SECRET: ${HMAC_SECRET}
      # SSO: must equal the credify-login app's JWT_SECRET (validates its cookie).
      CREDIFY_LOGIN_JWT_SECRET: ${CREDIFY_LOGIN_JWT_SECRET}
      SSO_ALLOWED_ORIGINS: ${SSO_ALLOWED_ORIGINS:-}
      NODE_ENV: production
    ports:
      # Kept exposed so the legacy http://35.255.131.130:3000 endpoint still
      # works during the domain cutover. Remove once everything uses the domain.
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy

# NOTE: TLS is terminated by the HOST nginx (which already owns :443 and holds
# the certbot wildcard cert), not by a container — see docker/nginx/chrome.conf
# for the server block to install on the host. The backend stays published on
# 3000 so the host nginx can proxy to 127.0.0.1:3000.

volumes:
  pgdata_prod:
