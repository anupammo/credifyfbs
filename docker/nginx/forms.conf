# Credify Form Builder — static hosting for forms.credifyfast.com
#
# HOST nginx server block (the same VM/nginx that serves chrome.credifyfast.com
# on :443 with the certbot wildcard cert *.credifyfast.com). It serves the
# standalone WEB build of the builder (app.html) as a static site.
#
# The builder talks to the API at https://chrome.credifyfast.com/api (CORS is
# open: Access-Control-Allow-Origin *), so NO backend change is needed for this
# origin. app.html has zero chrome.* extension calls — it runs as-is on the web;
# only localStorage + fetch are used.
#
# NOTE: forms.credifyfast.com is ALREADY live on the host nginx (a server block
# already exists and currently serves an older build). The usual task is just to
# REPUBLISH the new app.html (step A). This file documents the recommended
# server block (step B) in case it ever needs to be (re)created from scratch.
#
# ── A) Redeploy the new build (the common case) ──────────────────────────────
#   1) Find the web root the live site uses:
#        ROOT=$(nginx -T 2>/dev/null | awk '/server_name forms.credifyfast.com/{f=1} f&&/root /{print $2; exit}' | tr -d ';')
#        echo "$ROOT"          # e.g. /var/www/forms.credifyfast.com
#   2) Copy the new build there (from a repo checkout on the VM, or scp it up):
#        sudo cp app.html "$ROOT"/        # match the served filename (app.html or index.html)
#        sudo rsync -a icons "$ROOT"/     # only if the page references local icons
#   3) Verify (no nginx reload needed for a static file change):
#        curl -s https://forms.credifyfast.com/ | grep -m1 FILE:   # expect ...06-17-26..._MERGED
#      Open in a private window to bypass any browser cache.
#
#   From a workstation that can reach the VM over SSH:
#        scp app.html  <user>@<VM>:/tmp/app.html
#        ssh <user>@<VM> 'sudo cp /tmp/app.html "$ROOT"/app.html'
#
# ── B) Recommended server block (only if (re)creating the vhost) ─────────────
#   DNS:  forms.credifyfast.com  A → <VM public IP>  (wildcard cert *.credifyfast.com
#         already covers it — no new cert). Then:
#        sudo cp docker/nginx/forms.conf /etc/nginx/sites-available/forms.credifyfast.com.conf
#        sudo ln -s /etc/nginx/sites-available/forms.credifyfast.com.conf /etc/nginx/sites-enabled/
#        sudo nginx -t && sudo systemctl reload nginx
#      (On distros without sites-enabled, drop it in /etc/nginx/conf.d/ instead.)
#      WARNING: a forms.credifyfast.com block may already exist — replace it,
#      don't add a duplicate server_name.

server {
    listen 80;
    listen [::]:80;
    server_name forms.credifyfast.com;
    # Force HTTPS.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name forms.credifyfast.com;

    # Same certbot wildcard cert already on the host (*.credifyfast.com).
    ssl_certificate     /etc/letsencrypt/live/credifyfast.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/credifyfast.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root  /var/www/forms.credifyfast.com;
    index app.html;

    # The builder is one large self-contained file (inline JS + bundled
    # html2pdf). Compress it on the wire — it shrinks dramatically.
    gzip            on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types      text/css application/javascript image/svg+xml;

    # IMPORTANT: do NOT add a restrictive Content-Security-Policy — the builder
    # relies on inline <script> and eval() (html2pdf); a strict CSP breaks it.
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy        strict-origin-when-cross-origin always;

    # Serve the builder at / and tolerate unknown paths by falling back to it.
    location / {
        try_files $uri $uri/ /app.html;
    }

    # Always revalidate the HTML so a redeploy is picked up immediately. (Repeat
    # the security headers here — a location-level add_header resets inherited ones.)
    location = /app.html {
        add_header Cache-Control          "no-cache" always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy        strict-origin-when-cross-origin always;
    }

    # Long-cache immutable assets (icons, fonts).
    location ~* \.(?:png|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
