# TLS termination for the Credify backend.
# Serves https://chrome.credifyfast.com (covered by the *.credifyfast.com
# wildcard cert) and proxies to the backend container over the internal
# Docker network, which keeps speaking plain HTTP on :3000.

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name chrome.credifyfast.com;

    # Wildcard cert from certbot on the host, mounted read-only.
    # The whole /etc/letsencrypt tree is mounted so the live/ symlinks
    # resolve into archive/.
    ssl_certificate     /etc/letsencrypt/live/credifyfast.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/credifyfast.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Form schemas can be sizeable; don't let nginx reject them.
    client_max_body_size 10m;

    location / {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
