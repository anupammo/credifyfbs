# Credify backend — HTTPS for chrome.credifyfast.com
#
# This is a HOST nginx server block (the VM already runs nginx on :443 with the
# certbot wildcard cert). It is NOT used by docker-compose.
#
# Install on the VM:
#   sudo cp docker/nginx/chrome.conf /etc/nginx/sites-available/chrome.credifyfast.com.conf
#   sudo ln -s /etc/nginx/sites-available/chrome.credifyfast.com.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# (On distros without sites-enabled, drop it in /etc/nginx/conf.d/ instead.)

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name chrome.credifyfast.com;

    # certbot wildcard cert (*.credifyfast.com) already on the host.
    ssl_certificate     /etc/letsencrypt/live/credifyfast.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/credifyfast.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Form schemas can be sizeable; don't let nginx reject them.
    client_max_body_size 10m;

    location / {
        # The backend container publishes 3000 on the host loopback.
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
