<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self'; script-src 'self';" />
  <meta name="theme-color" content="#0a3d2b" />
  <title>Credify · Form Builder</title>
  <link rel="stylesheet" href="../styles/popup.css" />
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand">
        <div class="brand-mark">C</div>
        <div class="brand-name">Form Builder<span class="sub">Credify · With Weights</span></div>
      </div>
      <div class="topbar-actions">
        <div class="seg" id="mode-seg">
          <button type="button" class="page-tab active" data-mode="build">Build</button>
          <button type="button" class="page-tab" data-mode="preview">Preview</button>
        </div>
        <button type="button" class="btn" id="new-form-btn">New</button>
        <button type="button" class="btn ghost" id="clear-form-btn">Clear</button>
        <button type="button" class="btn primary" id="export-btn">Export</button>
      </div>
    </div>

    <div class="body">
      <aside class="leftpanel">
        <div class="left-tabs">
          <button type="button" class="left-tab active" id="fields-tab-btn">Fields</button>
          <button type="button" class="left-tab" id="blocks-tab-btn">Blocks</button>
        </div>
        <div class="left-scroll" id="left-fields"></div>
        <div class="left-scroll hidden" id="left-blocks"></div>
      </aside>

      <main class="canvas-wrap" id="canvas-wrap">
        <div class="canvas">
          <div class="form-head">
            <input id="form-title" class="form-title-input" placeholder="Enter form name here…" />
            <input id="form-desc" class="form-desc-input" placeholder="Add a description (optional)" />
          </div>
          <div id="rows-mount"></div>
        </div>
      </main>

      <main class="preview-wrap hidden" id="preview-wrap">
        <div class="preview-form" id="preview-mount"></div>
      </main>

      <aside class="inspector" id="inspector"></aside>
    </div>
  </div>

  <div class="modal-overlay hidden" id="export-modal">
    <div class="modal">
      <div class="modal-head">
        <h3>Export form</h3>
        <button class="x-btn" id="export-close-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <div class="modal-body">
        <div style="display:flex;gap:8px;margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:12px">
          <button class="btn" id="export-json-tab" type="button">JSON Schema</button>
          <button class="btn" id="export-html-tab" type="button">HTML Form</button>
        </div>
        <pre id="export-json" class="export-content"></pre>
        <textarea id="export-html" class="export-content hidden"></textarea>
      </div>
      <div class="modal-foot">
        <button class="btn" id="copy-export-btn" type="button">Copy to clipboard</button>
        <button class="btn" id="download-export-btn" type="button">Download</button>
        <button class="btn primary" id="close-export-btn" type="button">Done</button>
      </div>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
