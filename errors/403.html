<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Access denied · Credify</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --green-deep:#0a3d2b;--green-primary:#1a8a66;--green-accent:#22a87e;
    --mint-pale:#edfaf4;--mint-pale-2:#d4f4e8;
    --text-main:#0d1f18;--text-muted:#527060;--text-muted-2:#8aaa9a;
    --white:#fff;--border:#e2efe9;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;font-family:'Sora',system-ui,-apple-system,sans-serif;color:var(--text-main);
    background:linear-gradient(180deg,#f6faf8 0%,#eaf1ed 100%);
    display:flex;align-items:center;justify-content:center;padding:24px;min-height:100vh;
  }
  .card{
    width:100%;max-width:520px;background:var(--white);border:1px solid var(--border);
    border-radius:18px;padding:40px 36px;text-align:center;
    box-shadow:0 18px 50px -22px rgba(10,61,43,.35);
  }
  .brand{display:inline-flex;align-items:center;gap:10px;margin-bottom:26px}
  .brand-mark{
    width:34px;height:34px;border-radius:8px;
    background:linear-gradient(135deg,var(--green-deep),var(--green-primary));
    display:flex;align-items:center;justify-content:center;color:#fff;
    font-family:'Instrument Serif',Georgia,serif;font-size:21px;line-height:1;
  }
  .brand-name{font-family:'Instrument Serif',Georgia,serif;font-size:22px;color:var(--text-main);line-height:1}
  .code{
    font-family:'Instrument Serif',Georgia,serif;font-size:84px;line-height:.95;
    color:var(--green-primary);margin:6px 0 2px;letter-spacing:1px;
  }
  h1{font-family:'Instrument Serif',Georgia,serif;font-weight:400;font-size:28px;margin:0 0 10px;color:var(--text-main)}
  p{margin:0 auto 26px;max-width:390px;font-size:14.5px;line-height:1.6;color:var(--text-muted)}
  .actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .btn{
    display:inline-flex;align-items:center;gap:8px;font:600 14px 'Sora',sans-serif;
    text-decoration:none;border-radius:999px;padding:11px 22px;cursor:pointer;transition:.15s ease;
  }
  .btn-primary{background:var(--green-primary);color:#fff;border:1px solid var(--green-primary)}
  .btn-primary:hover{background:var(--green-deep);border-color:var(--green-deep)}
  .btn-ghost{background:#fff;color:var(--green-deep);border:1px solid var(--mint-pale-2)}
  .btn-ghost:hover{border-color:var(--green-primary);color:var(--green-primary)}
  .divider{height:1px;background:var(--border);margin:28px 0 16px}
  .foot{font-size:12px;color:var(--text-muted-2)}
  @media(max-width:480px){.card{padding:32px 22px}.code{font-size:68px}h1{font-size:24px}}
</style>
</head>
<body>
  <main class="card" role="main">
    <div class="brand">
      <div class="brand-mark">C</div>
      <div class="brand-name">Credify</div>
    </div>
    <div class="code">403</div>
    <h1>Access denied</h1>
    <p>You don&rsquo;t have permission to view this page. If you think this is a mistake, sign in with an account that has access or contact your administrator.</p>
    <div class="actions">
      <a class="btn btn-primary" href="https://login.credifyfast.com/login">Sign in</a>
      <a class="btn btn-ghost" href="https://forms.credifyfast.com/">Go to Form Builder</a>
    </div>
    <div class="divider"></div>
    <div class="foot">Credify &middot; Push It, Inc.</div>
  </main>
</body>
</html>
