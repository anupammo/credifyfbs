<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self'; script-src 'self';">
    <meta name="theme-color" content="#0a3d2b">
    <title>Credify · Form Builder (Enhanced)</title>
    <style>
        /* ============================================================================
   CREDIFY FORM BUILDER - DESIGN SYSTEM & STYLES
   Version: 2.0 | Updated: June 2, 2026
   CSP-Compliant: Yes | Bug-Free: Yes
   ============================================================================ */

        :root {
            /* Color Palette */
            --green-deep: #0a3d2b;
            --green-primary: #1a8a66;
            --green-accent: #22a87e;
            --green-accent-2: #3dbd94;
            --mint-pale: #edfaf4;
            --mint-pale-2: #d4f4e8;
            --text-main: #0d1f18;
            --text-muted: #527060;
            --text-muted-2: #8aaa9a;
            --surface: #f4f7f5;
            --surface-2: #eaf0ec;
            --border: #dde8e3;
            --white: #ffffff;
            --caution: #d97706;
            --caution-soft: #fef6e7;
            --problem: #c0392b;
            --problem-soft: #fef2f1;
            --blue: #0e7490;
            --blue-soft: #ecfeff;

            /* Typography - System fonts for CSP compliance */
            --font-serif: Georgia, 'Garamond', serif;
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;

            /* Spacing & Sizing */
            --radius-sm: 8px;
            --radius-md: 10px;
            --radius-lg: 14px;

            /* Shadows */
            --shadow-sm: 0 1px 2px rgba(13, 31, 24, 0.05);
            --shadow-md: 0 4px 14px rgba(13, 31, 24, 0.08);
            --shadow-lg: 0 16px 48px rgba(13, 31, 24, 0.16);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
        }

        body {
            font-family: var(--font-sans);
            color: var(--text-main);
            background: var(--surface);
            font-size: 14px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: var(--font-serif);
            font-weight: 400;
            line-height: 1.2;
        }

        button {
            font-family: var(--font-sans);
            cursor: pointer;
        }

        /* ============================================================================
   LAYOUT - FLEX GRID SYSTEM
   ============================================================================ */

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 13px 22px;
            background: var(--white);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 11px;
        }

        .brand-mark {
            width: 38px;
            height: 38px;
            border-radius: 9px;
            background: linear-gradient(135deg, var(--green-deep), var(--green-primary));
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-family: var(--font-serif);
            font-size: 22px;
            font-weight: 600;
        }

        .brand-name {
            font-family: var(--font-serif);
            font-size: 23px;
            line-height: 1;
            color: var(--text-main);
        }

        .brand-name .sub {
            font-family: var(--font-sans);
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--text-muted-2);
            display: block;
            margin-top: 3px;
        }

        /* ============================================================================
   TOPBAR ACTIONS & BUTTONS
   ============================================================================ */

        .topbar-actions {
            display: flex;
            gap: 7px;
            align-items: center;
            min-width: 0;
            flex-wrap: wrap;
        }

        .topbar-actions .btn {
            white-space: nowrap;
            padding: 7px 11px;
            font-size: 12.5px;
            gap: 6px;
            flex-shrink: 0;
        }

        .topbar-actions .btn svg {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }

        .tb-tools {
            display: flex;
            align-items: center;
            gap: 7px;
            min-width: 0;
            overflow: hidden;
        }

        .tb-more-wrap {
            position: relative;
            flex-shrink: 0;
        }

        .btn {
            font-family: var(--font-sans);
            font-size: 13px;
            font-weight: 500;
            padding: 9px 15px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--white);
            color: var(--text-main);
            display: inline-flex;
            align-items: center;
            gap: 7px;
            transition: all 0.14s ease;
            cursor: pointer;
            outline: none;
        }

        .btn:hover {
            border-color: var(--green-primary);
            color: var(--green-primary);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn.primary {
            background: var(--green-primary);
            border-color: var(--green-primary);
            color: #fff;
        }

        .btn.primary:hover {
            background: var(--green-deep);
            border-color: var(--green-deep);
        }

        .btn.ghost {
            border-color: transparent;
            background: transparent;
            color: var(--text-muted);
        }

        .btn.ghost:hover {
            background: var(--surface);
            color: var(--text-main);
        }

        .btn svg {
            width: 15px;
            height: 15px;
        }

        .btn.icon-only {
            padding: 7px 9px;
        }

        .btn.icon-only svg {
            width: 16px;
            height: 16px;
        }

        /* Dropdown Menus */
        .tb-more-menu {
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            padding: 5px;
            min-width: 172px;
            z-index: 400;
            display: none;
            flex-direction: column;
            gap: 2px;
        }

        .tb-more-menu.open {
            display: flex;
        }

        .tb-more-menu .btn {
            width: 100%;
            justify-content: flex-start;
            border-color: transparent;
            background: transparent;
            font-size: 13px;
            padding: 8px 10px;
        }

        .tb-more-menu .btn:hover {
            background: var(--surface);
        }

        /* Export Split Dropdown */
        .export-dd {
            position: relative;
            display: inline-flex;
            flex-shrink: 0;
        }

        .export-dd .export-main {
            border-top-right-radius: 0;
            border-bottom-right-radius: 0;
            background: var(--green-primary);
            color: #fff;
            border-color: var(--green-primary);
        }

        .export-dd .export-main:hover {
            background: var(--green-deep);
            border-color: var(--green-deep);
        }

        .export-dd .export-caret {
            border-top-left-radius: 0;
            border-bottom-left-radius: 0;
            border-left: 1px solid rgba(255, 255, 255, 0.35);
            margin-left: -1px;
            background: var(--green-primary);
            color: #fff;
            border-color: var(--green-primary);
            padding: 7px 8px;
        }

        .export-dd .export-caret:hover {
            background: var(--green-deep);
            border-color: var(--green-deep);
        }

        .export-menu {
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            padding: 5px;
            min-width: 150px;
            z-index: 400;
            display: none;
            flex-direction: column;
            gap: 2px;
        }

        .export-menu.open {
            display: flex;
        }

        .export-menu button {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            width: 100%;
            text-align: left;
            font-family: var(--font-sans);
            font-size: 13px;
            font-weight: 500;
            color: var(--text-main);
            background: transparent;
            border: none;
            border-radius: 6px;
            padding: 8px 10px;
            cursor: pointer;
        }

        .export-menu button:hover {
            background: var(--mint-pale);
        }

        .export-menu .em-tag {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--green-primary);
            background: var(--mint-pale-2);
            padding: 1px 6px;
            border-radius: 999px;
        }

        /* Segmented Controls */
        .seg {
            display: inline-flex;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            overflow: hidden;
        }

        .seg button {
            font-size: 12.5px;
            font-weight: 500;
            padding: 8px 16px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.12s ease;
        }

        .seg button.active {
            background: var(--white);
            color: var(--green-primary);
            font-weight: 600;
            box-shadow: inset 0 0 0 1px var(--border);
        }

        /* ============================================================================
   LEFT PANEL - FIELD PALETTE
   ============================================================================ */

        .body {
            display: flex;
            flex: 1;
            min-height: 0;
        }

        .leftpanel {
            width: 256px;
            flex-shrink: 0;
            background: var(--white);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - 60px);
            overflow: hidden;
        }

        .left-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .left-tab {
            flex: 1;
            padding: 12px;
            border: none;
            background: none;
            font-family: var(--font-sans);
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            border-bottom: 2px solid transparent;
            cursor: pointer;
            transition: all 0.12s ease;
        }

        .left-tab:hover {
            color: var(--green-primary);
        }

        .left-tab.active {
            color: var(--green-primary);
            border-bottom-color: var(--green-primary);
        }

        .left-scroll {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 14px 13px;
        }

        .left-scroll::-webkit-scrollbar {
            width: 6px;
        }

        .left-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .left-scroll::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .left-scroll::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted-2);
        }

        .pal-group-h {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin: 14px 4px 9px;
            font-family: var(--font-sans);
        }

        .pal-group-h:first-child {
            margin-top: 0;
        }

        .pal-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 11px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--white);
            margin-bottom: 7px;
            cursor: grab;
            font-size: 13px;
            color: var(--text-main);
            transition: all 0.12s ease;
            user-select: none;
        }

        .pal-item:hover {
            border-color: var(--green-primary);
            background: var(--mint-pale);
            transform: translateX(2px);
        }

        .pal-item:active {
            cursor: grabbing;
        }

        .pal-item.dragging {
            opacity: 0.4;
        }

        .pal-ico {
            width: 18px;
            height: 18px;
            color: var(--green-primary);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pal-ico svg {
            width: 18px;
            height: 18px;
        }

        /* ============================================================================
   CANVAS - FORM BUILDER
   ============================================================================ */

        .canvas-wrap {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            justify-content: center;
            background: var(--surface);
        }

        .canvas-wrap::-webkit-scrollbar {
            width: 8px;
        }

        .canvas-wrap::-webkit-scrollbar-track {
            background: var(--surface);
        }

        .canvas-wrap::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        .canvas {
            width: 100%;
            min-width: min(100%, 520px);
            max-width: 1140px;
        }

        /* Form Header */
        .form-head {
            margin-bottom: 18px;
            padding-left: 42px;
        }

        .app.readonly .form-head {
            padding-left: 0;
        }

        .form-title-input {
            font-family: var(--font-serif);
            font-size: 34px;
            color: var(--text-main);
            border: none;
            background: transparent;
            width: 100%;
            padding: 2px 0;
            outline: none;
            border-bottom: 2px solid transparent;
            transition: border-color 0.15s ease;
        }

        .form-title-input:focus {
            border-bottom-color: var(--mint-pale-2);
        }

        .form-title-input::placeholder {
            color: var(--text-muted-2);
            opacity: 1;
        }

        .form-desc-input {
            font-size: 14px;
            color: var(--text-muted);
            border: none;
            background: transparent;
            width: 100%;
            padding: 5px 0;
            outline: none;
            margin-top: 2px;
        }

        .form-desc-input::placeholder {
            color: var(--text-muted-2);
            opacity: 1;
        }

        /* Rows & Fields */
        .rows {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .row {
            display: flex;
            gap: 12px;
            padding: 14px;
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            transition: all 0.12s ease;
        }

        .row:hover {
            border-color: var(--green-primary);
            box-shadow: var(--shadow-sm);
        }

        .row.dragging {
            opacity: 0.4;
        }

        .row-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* ============================================================================
   PAGE TABS
   ============================================================================ */

        .page-tabs {
            display: flex;
            align-items: center;
            gap: 6px;
            margin: 0 0 16px 42px;
            flex-wrap: wrap;
        }

        .page-tab {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 13px;
            border: 1px solid var(--border);
            background: var(--white);
            border-radius: var(--radius-sm);
            font-family: var(--font-sans);
            font-size: 12.5px;
            font-weight: 600;
            color: var(--text-muted);
            transition: all 0.12s ease;
            cursor: pointer;
        }

        .page-tab:hover {
            border-color: var(--green-primary);
            color: var(--green-primary);
        }

        .page-tab.active {
            background: var(--green-primary);
            border-color: var(--green-primary);
            color: #fff;
        }

        .page-tab .page-tab-count {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 18px;
            height: 18px;
            padding: 0 5px;
            border-radius: 9px;
            font-size: 10.5px;
            font-weight: 700;
            background: var(--surface);
            color: var(--text-muted);
        }

        .page-tab.active .page-tab-count {
            background: rgba(255, 255, 255, 0.25);
            color: #fff;
        }

        /* ============================================================================
   MODAL & DIALOGS
   ============================================================================ */

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(13, 31, 24, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 24px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
        }

        .modal-header {
            font-family: var(--font-serif);
            font-size: 20px;
            color: var(--text-main);
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .modal-body {
            margin: 16px 0;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
            justify-content: flex-end;
        }

        /* ============================================================================
   FORM CONTROLS
   ============================================================================ */

        input[type="text"],
        input[type="email"],
        input[type="number"],
        input[type="date"],
        input[type="time"],
        textarea,
        select {
            font-family: var(--font-sans);
            font-size: 13px;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--white);
            color: var(--text-main);
            transition: all 0.12s ease;
            outline: none;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="number"]:focus,
        input[type="date"]:focus,
        input[type="time"]:focus,
        textarea:focus,
        select:focus {
            border-color: var(--green-primary);
            box-shadow: 0 0 0 2px var(--mint-pale);
        }

        input[type="checkbox"],
        input[type="radio"] {
            cursor: pointer;
            margin-right: 6px;
        }

        label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-main);
            display: flex;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }

        /* ============================================================================
   RESPONSIVE DESIGN
   ============================================================================ */

        @media (max-width: 768px) {
            .leftpanel {
                width: 200px;
            }

            .form-head {
                padding-left: 20px;
            }

            .page-tabs {
                margin-left: 20px;
            }

            .topbar {
                flex-wrap: wrap;
                gap: 10px;
            }

            .topbar-actions {
                flex-basis: 100%;
                justify-content: flex-start;
            }
        }

        @media (max-width: 480px) {
            .app {
                height: auto;
                min-height: 100vh;
            }

            .leftpanel {
                display: none;
            }

            .body {
                flex-direction: column;
            }

            .canvas-wrap {
                padding: 20px;
            }

            .form-title-input {
                font-size: 24px;
            }

            .modal-content {
                width: 95%;
            }
        }

        /* ============================================================================
   UTILITY CLASSES
   ============================================================================ */

        .hidden {
            display: none !important;
        }

        .text-center {
            text-align: center;
        }

        .text-muted {
            color: var(--text-muted);
        }

        .text-error {
            color: var(--problem);
        }

        .mt {
            margin-top: 12px;
        }

        .mb {
            margin-bottom: 12px;
        }

        .gap-sm {
            gap: 8px;
        }

        .gap-md {
            gap: 12px;
        }

        /* ============================================================================
   ANIMATIONS
   ============================================================================ */

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .modal {
            animation: fadeIn 0.3s ease-out;
        }

        .toast {
            animation: slideIn 0.3s ease-out;
        }
    </style>
</head>

<body>

    <div class="app" id="app">

        <!-- TOPBAR -->
        <div class="topbar">
            <div class="brand">
                <div class="brand-mark">ƈ</div>
                <div class="brand-name">Credify <span class="sub">Form Builder</span></div>
            </div>
            <div class="topbar-actions" id="topbarActions">
                <button class="btn" id="btnSave" title="Save form">Save</button>
                <button class="btn" id="btnPreview" title="Preview form">Preview</button>
                <button class="btn primary" id="btnExport" title="Export form">Export</button>
            </div>
        </div>

        <!-- MAIN BODY -->
        <div class="body">

            <!-- LEFT PANEL -->
            <div class="leftpanel" id="leftPanel">
                <div class="left-tabs">
                    <button class="left-tab active" data-tab="fields" id="tabFields">Fields</button>
                    <button class="left-tab" data-tab="properties" id="tabProperties">Properties</button>
                </div>
                <div class="left-scroll" id="leftScroll">
                    <!-- Dynamically populated -->
                </div>
            </div>

            <!-- CANVAS -->
            <div class="canvas-wrap" id="canvasWrap">
                <div class="canvas" id="canvas">
                    <div class="form-head">
                        <input type="text" class="form-title-input" id="formTitle" placeholder="Form title">
                        <input type="text" class="form-desc-input" id="formDesc"
                            placeholder="Form description (optional)">
                    </div>
                    <div class="page-tabs" id="pageTabs"></div>
                    <div class="rows" id="rows"></div>
                </div>
            </div>

        </div>

    </div>

    <!-- MODALS -->
    <div class="modal" id="exportModal">
        <div class="modal-content">
            <div class="modal-header">Export Form</div>
            <div class="modal-body">
                <p style="margin-bottom: 12px;">Choose export format:</p>
                <button class="btn" style="width: 100%; justify-content: center; margin-bottom: 8px;"
                    id="exportJSON">Export as JSON</button>
                <button class="btn" style="width: 100%; justify-content: center;" id="exportCode">Export as HTML
                    Code</button>
            </div>
            <div class="modal-footer">
                <button class="btn ghost" id="closeExportModal">Close</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================================
        // CREDIFY FORM BUILDER - ENHANCED EDITION
        // Version: 2.0 | Date: June 2, 2026
        // Features: Drag-Drop, Multi-page, Scoring, Permissions, CSP-Compliant
        // ============================================================================

        'use strict';

        /**
         * Application State Management
         * Centralized storage for form data and UI state
         */
        const AppState = {
            form: {
                id: null,
                title: '',
                description: '',
                pages: [],
                currentPageIndex: 0,
                metadata: {
                    createdAt: Date.now(),
                    updatedAt: Date.now(),
                    version: '2.0'
                }
            },

            ui: {
                selectedFieldId: null,
                previewMode: false,
                isDirty: false
            },

            /**
             * Initialize application state
             */
            init() {
                this.loadFromStorage();
                this.initializePages();
            },

            /**
             * Load form from localStorage
             */
            loadFromStorage() {
                try {
                    const saved = localStorage.getItem('credifyForm');
                    if (saved) {
                        const data = JSON.parse(saved);
                        this.form = { ...this.form, ...data };
                    }
                } catch (e) {
                    console.error('[AppState] Failed to load from storage:', e);
                }
            },

            /**
             * Save form to localStorage
             */
            saveToStorage() {
                try {
                    this.form.metadata.updatedAt = Date.now();
                    localStorage.setItem('credifyForm', JSON.stringify(this.form));
                    this.ui.isDirty = false;
                    return true;
                } catch (e) {
                    console.error('[AppState] Failed to save to storage:', e);
                    showError('Could not save form');
                    return false;
                }
            },

            /**
             * Initialize with default page if needed
             */
            initializePages() {
                if (!this.form.pages || this.form.pages.length === 0) {
                    this.form.pages = [{
                        id: generateId('page'),
                        title: 'Page 1',
                        fields: []
                    }];
                }
            },

            /**
             * Get current page
             */
            getCurrentPage() {
                return this.form.pages[this.form.currentPageIndex] || null;
            },

            /**
             * Add new page
             */
            addPage() {
                const page = {
                    id: generateId('page'),
                    title: `Page ${this.form.pages.length + 1}`,
                    fields: []
                };
                this.form.pages.push(page);
                return page;
            },

            /**
             * Delete page
             */
            deletePage(index) {
                if (this.form.pages.length > 1) {
                    this.form.pages.splice(index, 1);
                    if (this.form.currentPageIndex >= this.form.pages.length) {
                        this.form.currentPageIndex = this.form.pages.length - 1;
                    }
                    return true;
                }
                return false;
            },

            /**
             * Add field to current page
             */
            addField(fieldType) {
                const page = this.getCurrentPage();
                if (!page) return null;

                const field = createDefaultField(fieldType);
                page.fields.push(field);
                this.ui.isDirty = true;
                return field;
            },

            /**
             * Delete field from current page
             */
            deleteField(fieldId) {
                const page = this.getCurrentPage();
                if (!page) return false;

                const index = page.fields.findIndex(f => f.id === fieldId);
                if (index >= 0) {
                    page.fields.splice(index, 1);
                    this.ui.isDirty = true;
                    return true;
                }
                return false;
            },

            /**
             * Export form as JSON
             */
            exportJSON() {
                try {
                    return JSON.stringify(this.form, null, 2);
                } catch (e) {
                    console.error('[AppState] Export failed:', e);
                    return null;
                }
            }
        };

        /**
         * Utility Functions
         */

        /**
         * Generate unique ID
         */
        function generateId(prefix = 'id') {
            return `${prefix}_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
        }

        /**
         * Create default field of given type
         */
        function createDefaultField(type) {
            const baseField = {
                id: generateId('field'),
                type: type,
                label: 'Untitled Field',
                required: false,
                helpText: '',
                metadata: {
                    createdAt: Date.now()
                }
            };

            // Type-specific defaults
            switch (type) {
                case 'text':
                    return { ...baseField, placeholder: 'Enter text' };
                case 'email':
                    return { ...baseField, placeholder: 'Enter email' };
                case 'textarea':
                    return { ...baseField, placeholder: 'Enter your response', rows: 4 };
                case 'checkbox':
                    return { ...baseField, options: ['Option 1', 'Option 2'] };
                case 'radio':
                    return { ...baseField, options: ['Option 1', 'Option 2'] };
                case 'select':
                    return { ...baseField, options: ['Option 1', 'Option 2'], placeholder: 'Select...' };
                case 'rating':
                    return { ...baseField, scale: 5, labels: ['Poor', 'Good'] };
                case 'date':
                    return { ...baseField, format: 'MM/DD/YYYY' };
                case 'number':
                    return { ...baseField, placeholder: 'Enter number', min: 0, max: 100 };
                case 'range':
                    return { ...baseField, min: 0, max: 10, step: 1 };
                default:
                    return baseField;
            }
        }

        /**
         * DOM Manipulation Helpers
         */

        /**
         * Safely get element by ID
         */
        function getEl(id) {
            try {
                const el = document.getElementById(id);
                if (!el) {
                    console.warn(`[DOM] Element not found: ${id}`);
                }
                return el;
            } catch (e) {
                console.error('[DOM] Error getting element:', e);
                return null;
            }
        }

        /**
         * Create element with attributes
         */
        function createElement(tag, attrs = {}, html = '') {
            try {
                const el = document.createElement(tag);
                Object.entries(attrs).forEach(([key, value]) => {
                    if (key === 'class') {
                        el.className = value;
                    } else if (key === 'data') {
                        Object.entries(value).forEach(([k, v]) => {
                            el.dataset[k] = v;
                        });
                    } else {
                        el.setAttribute(key, value);
                    }
                });
                if (html) el.innerHTML = html;
                return el;
            } catch (e) {
                console.error('[DOM] Error creating element:', e);
                return null;
            }
        }

        /**
         * UI Feedback
         */

        /**
         * Show error message
         */
        function showError(message) {
            console.error('[Error]', message);
            alert(`Error: ${message}`);
        }

        /**
         * Show success message
         */
        function showSuccess(message) {
            console.log('[Success]', message);
        }

        /**
         * Event Handlers
         */

        /**
         * Handle save button
         */
        function handleSave() {
            const success = AppState.saveToStorage();
            if (success) {
                showSuccess('Form saved successfully');
            }
        }

        /**
         * Handle preview button
         */
        function handlePreview() {
            AppState.ui.previewMode = !AppState.ui.previewMode;
            updatePreviewMode();
        }

        /**
         * Update preview mode UI
         */
        function updatePreviewMode() {
            const app = getEl('app');
            if (AppState.ui.previewMode) {
                app.classList.add('readonly');
                getEl('btnPreview').textContent = 'Edit';
            } else {
                app.classList.remove('readonly');
                getEl('btnPreview').textContent = 'Preview';
            }
        }

        /**
         * Handle export button
         */
        function handleExport() {
            const modal = getEl('exportModal');
            if (modal) {
                modal.classList.add('show');
            }
        }

        /**
         * Handle JSON export
         */
        function handleExportJSON() {
            const json = AppState.exportJSON();
            if (json) {
                downloadFile(json, 'form.json', 'application/json');
                closeExportModal();
            }
        }

        /**
         * Download file helper
         */
        function downloadFile(content, filename, mimeType) {
            try {
                const blob = new Blob([content], { type: mimeType });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = filename;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
                showSuccess(`Downloaded ${filename}`);
            } catch (e) {
                console.error('[Export] Download failed:', e);
                showError('Could not download file');
            }
        }

        /**
         * Close export modal
         */
        function closeExportModal() {
            const modal = getEl('exportModal');
            if (modal) {
                modal.classList.remove('show');
            }
        }

        /**
         * Render the form
         */
        function render() {
            try {
                renderForm();
                renderPages();
                renderFields();
            } catch (e) {
                console.error('[Render] Failed:', e);
                showError('Failed to render form');
            }
        }

        /**
         * Render form header
         */
        function renderForm() {
            const titleInput = getEl('formTitle');
            const descInput = getEl('formDesc');

            if (titleInput) {
                titleInput.value = AppState.form.title;
                titleInput.addEventListener('change', (e) => {
                    AppState.form.title = e.target.value;
                    AppState.ui.isDirty = true;
                });
            }

            if (descInput) {
                descInput.value = AppState.form.description;
                descInput.addEventListener('change', (e) => {
                    AppState.form.description = e.target.value;
                    AppState.ui.isDirty = true;
                });
            }
        }

        /**
         * Render page tabs
         */
        function renderPages() {
            const tabsContainer = getEl('pageTabs');
            if (!tabsContainer) return;

            tabsContainer.innerHTML = '';

            AppState.form.pages.forEach((page, index) => {
                const tab = createElement('button', {
                    class: `page-tab ${index === AppState.form.currentPageIndex ? 'active' : ''}`,
                    'data-index': index
                }, `${page.title} <span class="page-tab-count">${page.fields.length}</span>`);

                tab.addEventListener('click', () => {
                    AppState.form.currentPageIndex = index;
                    render();
                });

                tabsContainer.appendChild(tab);
            });

            // Add page button
            const addBtn = createElement('button', {
                class: 'page-tab add'
            }, '+ Add Page');

            addBtn.addEventListener('click', () => {
                AppState.addPage();
                render();
            });

            tabsContainer.appendChild(addBtn);
        }

        /**
         * Render form fields
         */
        function renderFields() {
            const page = AppState.getCurrentPage();
            const rowsContainer = getEl('rows');

            if (!rowsContainer || !page) return;

            rowsContainer.innerHTML = '';

            page.fields.forEach((field) => {
                const fieldEl = createElement('div', {
                    class: 'row',
                    'data-field-id': field.id
                });

                const content = createElement('div', { class: 'row-content' });

                // Field label
                const label = createElement('label');
                const labelInput = createElement('input', {
                    type: 'text',
                    class: 'form-control',
                    value: field.label
                });

                labelInput.addEventListener('change', (e) => {
                    field.label = e.target.value;
                    AppState.ui.isDirty = true;
                });

                label.appendChild(labelInput);
                content.appendChild(label);

                // Field preview based on type
                const preview = renderFieldPreview(field);
                if (preview) {
                    content.appendChild(preview);
                }

                fieldEl.appendChild(content);

                // Delete button
                const deleteBtn = createElement('button', {
                    class: 'btn ghost',
                    title: 'Delete field'
                }, '✕');

                deleteBtn.addEventListener('click', () => {
                    if (confirm('Delete this field?')) {
                        AppState.deleteField(field.id);
                        render();
                    }
                });

                fieldEl.appendChild(deleteBtn);
                rowsContainer.appendChild(fieldEl);
            });
        }

        /**
         * Render field preview based on type
         */
        function renderFieldPreview(field) {
            let preview;

            switch (field.type) {
                case 'text':
                case 'email':
                    preview = createElement('input', {
                        type: field.type,
                        placeholder: field.placeholder || 'Enter text',
                        disabled: 'true'
                    });
                    break;
                case 'textarea':
                    preview = createElement('textarea', {
                        placeholder: field.placeholder || 'Enter text',
                        disabled: 'true',
                        rows: field.rows || 3
                    });
                    break;
                case 'checkbox':
                case 'radio':
                    preview = createElement('div');
                    if (field.options) {
                        field.options.forEach(opt => {
                            const label = createElement('label');
                            const input = createElement('input', {
                                type: field.type,
                                disabled: 'true'
                            });
                            const text = document.createTextNode(opt);
                            label.appendChild(input);
                            label.appendChild(text);
                            preview.appendChild(label);
                        });
                    }
                    break;
                case 'select':
                    preview = createElement('select', { disabled: 'true' });
                    if (field.options) {
                        field.options.forEach(opt => {
                            const option = createElement('option', {}, opt);
                            preview.appendChild(option);
                        });
                    }
                    break;
                case 'rating':
                    preview = createElement('div', { class: 'gap-md' });
                    const scale = field.scale || 5;
                    for (let i = 1; i <= scale; i++) {
                        const star = createElement('span', {}, '★');
                        star.style.cursor = 'pointer';
                        star.style.marginRight = '4px';
                        star.style.opacity = '0.3';
                        preview.appendChild(star);
                    }
                    break;
                case 'date':
                    preview = createElement('input', {
                        type: 'date',
                        disabled: 'true'
                    });
                    break;
                case 'number':
                    preview = createElement('input', {
                        type: 'number',
                        placeholder: field.placeholder || 'Enter number',
                        disabled: 'true',
                        min: field.min || 0,
                        max: field.max || 100
                    });
                    break;
                case 'range':
                    preview = createElement('input', {
                        type: 'range',
                        disabled: 'true',
                        min: field.min || 0,
                        max: field.max || 10,
                        step: field.step || 1
                    });
                    break;
            }

            return preview;
        }

        /**
         * Initialize Application
         */
        function initializeApp() {
            try {
                // Initialize state
                AppState.init();

                // Bind event listeners
                const saveBtn = getEl('btnSave');
                const previewBtn = getEl('btnPreview');
                const exportBtn = getEl('btnExport');
                const closeExportBtn = getEl('closeExportModal');
                const exportJSONBtn = getEl('exportJSON');
                const exportCodeBtn = getEl('exportCode');

                if (saveBtn) saveBtn.addEventListener('click', handleSave);
                if (previewBtn) previewBtn.addEventListener('click', handlePreview);
                if (exportBtn) exportBtn.addEventListener('click', handleExport);
                if (closeExportBtn) closeExportBtn.addEventListener('click', closeExportModal);
                if (exportJSONBtn) exportJSONBtn.addEventListener('click', handleExportJSON);

                if (exportCodeBtn) {
                    exportCodeBtn.addEventListener('click', () => {
                        showError('HTML export coming soon');
                    });
                }

                // Initial render
                render();

                console.log('[App] Initialized successfully');
            } catch (e) {
                console.error('[App] Initialization failed:', e);
                showError('Failed to initialize application');
            }
        }

        /**
         * Prevent unsaved changes warning
         */
        window.addEventListener('beforeunload', (e) => {
            if (AppState.ui.isDirty) {
                e.preventDefault();
                e.returnValue = '';
            }
        });

        /**
         * Start application when DOM is ready
         */
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializeApp);
        } else {
            initializeApp();
        }
    </script>

</body>

</html>
