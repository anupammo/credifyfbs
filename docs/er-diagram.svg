<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 1000" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <style>
    .tbl  { fill:#ffffff; stroke:#2b7cc4; stroke-width:1.5; }
    .hdr  { fill:#2b7cc4; }
    .htxt { fill:#ffffff; font-weight:700; font-size:14px; }
    .col  { fill:#1f2937; font-size:13px; }
    .key  { fill:#8a94a6; font-style:italic; font-size:11px; }
    .rel  { fill:none; stroke:#6f9fc4; stroke-width:1.5; }
    .dot  { fill:#6f9fc4; }
    .title{ fill:#0f3d2b; font-weight:700; font-size:22px; }
    .sub  { fill:#6b7280; font-size:13px; }
  </style>

  <text class="title" x="620" y="34" text-anchor="middle">Credify · Multi-tenant ER Diagram</text>
  <text class="sub" x="620" y="54" text-anchor="middle">PostgreSQL · accessed through Prisma · every table scoped by organizationId</text>

  <!-- ============ RELATIONSHIPS ============ -->
  <!-- Organization -> User.organizationId -->
  <polyline class="rel" points="270,102 370,102 370,222 470,222"/>
  <!-- Organization -> Form.organizationId -->
  <polyline class="rel" points="270,102 410,102 410,680 470,680"/>
  <!-- Organization -> Group.organizationId -->
  <polyline class="rel" points="270,102 300,102 300,584 270,584"/>
  <!-- Organization -> Block.organizationId -->
  <polyline class="rel" points="270,102 330,102 330,874 270,874"/>
  <!-- User -> Form.ownerId -->
  <polyline class="rel" points="470,102 440,102 440,656 470,656"/>
  <!-- User -> RefreshToken.userId -->
  <polyline class="rel" points="690,102 815,102 815,150 940,150"/>
  <!-- User -> FormShare.userId -->
  <polyline class="rel" points="690,102 835,102 835,560 940,560"/>
  <!-- User -> AuditLog.userId -->
  <polyline class="rel" points="690,102 855,102 855,786 940,786"/>
  <!-- Group -> Form.groupId -->
  <polyline class="rel" points="270,512 425,512 425,704 470,704"/>
  <!-- Form -> FormShare.formId -->
  <polyline class="rel" points="690,512 815,512 815,536 940,536"/>
  <!-- Form -> AuditLog.formId -->
  <polyline class="rel" points="690,512 870,512 870,882 940,882"/>

  <!-- endpoint dots -->
  <circle class="dot" cx="270" cy="102" r="3.5"/>
  <circle class="dot" cx="470" cy="222" r="3.5"/>
  <circle class="dot" cx="470" cy="680" r="3.5"/>
  <circle class="dot" cx="270" cy="584" r="3.5"/>
  <circle class="dot" cx="270" cy="874" r="3.5"/>
  <circle class="dot" cx="470" cy="102" r="3.5"/>
  <circle class="dot" cx="470" cy="656" r="3.5"/>
  <circle class="dot" cx="690" cy="102" r="3.5"/>
  <circle class="dot" cx="940" cy="150" r="3.5"/>
  <circle class="dot" cx="940" cy="560" r="3.5"/>
  <circle class="dot" cx="940" cy="786" r="3.5"/>
  <circle class="dot" cx="270" cy="512" r="3.5"/>
  <circle class="dot" cx="470" cy="704" r="3.5"/>
  <circle class="dot" cx="690" cy="512" r="3.5"/>
  <circle class="dot" cx="940" cy="536" r="3.5"/>
  <circle class="dot" cx="940" cy="882" r="3.5"/>

  <!-- ============ Organization ============ -->
  <g>
    <rect class="tbl" x="60" y="60" width="210" height="150" rx="6"/>
    <rect class="hdr" x="60" y="60" width="210" height="30" rx="6"/>
    <text class="htxt" x="165" y="80" text-anchor="middle">Organization</text>
    <text class="col" x="72" y="106">id</text><text class="key" x="260" y="106" text-anchor="end">PK</text>
    <text class="col" x="72" y="130">name</text>
    <text class="col" x="72" y="154">slug</text><text class="key" x="260" y="154" text-anchor="end">UK</text>
    <text class="col" x="72" y="178">createdAt</text>
    <text class="col" x="72" y="202">updatedAt</text>
  </g>

  <!-- ============ User ============ -->
  <g>
    <rect class="tbl" x="470" y="60" width="220" height="246" rx="6"/>
    <rect class="hdr" x="470" y="60" width="220" height="30" rx="6"/>
    <text class="htxt" x="580" y="80" text-anchor="middle">User</text>
    <text class="col" x="482" y="106">id</text><text class="key" x="683" y="106" text-anchor="end">PK</text>
    <text class="col" x="482" y="130">email</text><text class="key" x="683" y="130" text-anchor="end">UK</text>
    <text class="col" x="482" y="154">name</text>
    <text class="col" x="482" y="178">passwordHash</text>
    <text class="col" x="482" y="202">role</text><text class="key" x="683" y="202" text-anchor="end">enum</text>
    <text class="col" x="482" y="226">organizationId</text><text class="key" x="683" y="226" text-anchor="end">FK</text>
    <text class="col" x="482" y="250">createdAt</text>
    <text class="col" x="482" y="274">updatedAt</text>
    <text class="col" x="482" y="298">deletedAt</text>
  </g>

  <!-- ============ RefreshToken ============ -->
  <g>
    <rect class="tbl" x="940" y="60" width="210" height="174" rx="6"/>
    <rect class="hdr" x="940" y="60" width="210" height="30" rx="6"/>
    <text class="htxt" x="1045" y="80" text-anchor="middle">RefreshToken</text>
    <text class="col" x="952" y="106">id</text><text class="key" x="1140" y="106" text-anchor="end">PK</text>
    <text class="col" x="952" y="130">tokenHash</text><text class="key" x="1140" y="130" text-anchor="end">UK</text>
    <text class="col" x="952" y="154">userId</text><text class="key" x="1140" y="154" text-anchor="end">FK</text>
    <text class="col" x="952" y="178">expiresAt</text>
    <text class="col" x="952" y="202">revokedAt</text>
    <text class="col" x="952" y="226">createdAt</text>
  </g>

  <!-- ============ Group ============ -->
  <g>
    <rect class="tbl" x="60" y="470" width="210" height="174" rx="6"/>
    <rect class="hdr" x="60" y="470" width="210" height="30" rx="6"/>
    <text class="htxt" x="165" y="490" text-anchor="middle">Group</text>
    <text class="col" x="72" y="516">id</text><text class="key" x="260" y="516" text-anchor="end">PK</text>
    <text class="col" x="72" y="540">name</text>
    <text class="col" x="72" y="564">color</text>
    <text class="col" x="72" y="588">organizationId</text><text class="key" x="260" y="588" text-anchor="end">FK</text>
    <text class="col" x="72" y="612">createdAt</text>
    <text class="col" x="72" y="636">updatedAt</text>
  </g>

  <!-- ============ Form ============ -->
  <g>
    <rect class="tbl" x="470" y="470" width="220" height="342" rx="6"/>
    <rect class="hdr" x="470" y="470" width="220" height="30" rx="6"/>
    <text class="htxt" x="580" y="490" text-anchor="middle">Form</text>
    <text class="col" x="482" y="516">id</text><text class="key" x="683" y="516" text-anchor="end">PK</text>
    <text class="col" x="482" y="540">title</text>
    <text class="col" x="482" y="564">description</text>
    <text class="col" x="482" y="588">schemaEnc</text><text class="key" x="683" y="588" text-anchor="end">bytea</text>
    <text class="col" x="482" y="612">schemaIv</text>
    <text class="col" x="482" y="636">schemaTag</text>
    <text class="col" x="482" y="660">ownerId</text><text class="key" x="683" y="660" text-anchor="end">FK</text>
    <text class="col" x="482" y="684">organizationId</text><text class="key" x="683" y="684" text-anchor="end">FK</text>
    <text class="col" x="482" y="708">groupId</text><text class="key" x="683" y="708" text-anchor="end">FK</text>
    <text class="col" x="482" y="732">scoringSections</text><text class="key" x="683" y="732" text-anchor="end">json</text>
    <text class="col" x="482" y="756">createdAt</text>
    <text class="col" x="482" y="780">updatedAt</text>
    <text class="col" x="482" y="804">deletedAt</text>
  </g>

  <!-- ============ FormShare ============ -->
  <g>
    <rect class="tbl" x="940" y="470" width="210" height="126" rx="6"/>
    <rect class="hdr" x="940" y="470" width="210" height="30" rx="6"/>
    <text class="htxt" x="1045" y="490" text-anchor="middle">FormShare</text>
    <text class="col" x="952" y="516">id</text><text class="key" x="1140" y="516" text-anchor="end">PK</text>
    <text class="col" x="952" y="540">formId</text><text class="key" x="1140" y="540" text-anchor="end">FK</text>
    <text class="col" x="952" y="564">userId</text><text class="key" x="1140" y="564" text-anchor="end">FK</text>
    <text class="col" x="952" y="588">access</text><text class="key" x="1140" y="588" text-anchor="end">enum</text>
  </g>

  <!-- ============ Block ============ -->
  <g>
    <rect class="tbl" x="60" y="760" width="210" height="174" rx="6"/>
    <rect class="hdr" x="60" y="760" width="210" height="30" rx="6"/>
    <text class="htxt" x="165" y="780" text-anchor="middle">Block</text>
    <text class="col" x="72" y="806">id</text><text class="key" x="260" y="806" text-anchor="end">PK</text>
    <text class="col" x="72" y="830">name</text>
    <text class="col" x="72" y="854">fieldsJson</text><text class="key" x="260" y="854" text-anchor="end">json</text>
    <text class="col" x="72" y="878">organizationId</text><text class="key" x="260" y="878" text-anchor="end">FK</text>
    <text class="col" x="72" y="902">createdAt</text>
    <text class="col" x="72" y="926">updatedAt</text>
  </g>

  <!-- ============ AuditLog ============ -->
  <g>
    <rect class="tbl" x="940" y="720" width="210" height="198" rx="6"/>
    <rect class="hdr" x="940" y="720" width="210" height="30" rx="6"/>
    <text class="htxt" x="1045" y="740" text-anchor="middle">AuditLog</text>
    <text class="col" x="952" y="766">id</text><text class="key" x="1140" y="766" text-anchor="end">PK</text>
    <text class="col" x="952" y="790">userId</text><text class="key" x="1140" y="790" text-anchor="end">FK</text>
    <text class="col" x="952" y="814">action</text>
    <text class="col" x="952" y="838">entityId</text>
    <text class="col" x="952" y="862">meta</text><text class="key" x="1140" y="862" text-anchor="end">json</text>
    <text class="col" x="952" y="886">formId</text><text class="key" x="1140" y="886" text-anchor="end">FK</text>
    <text class="col" x="952" y="910">createdAt</text>
  </g>
</svg>
